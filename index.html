    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }

        footer { margin-top: 50px; font-size: 0.8em; border-top: 1px solid #eee; padding-top: 20px; }
        .social-links {
            display: flex;
            gap: 20px;
            justify-content: center;

        .social-links a {
            color: #555;
            font-size: 24px;
            text-decoration: none;

        .fa-youtube:hover { color: #FF0000 !important; }
        .fa-discord:hover { color: #5865F2 !important; }
        .fa-pinterest:hover { color: #E60023 !important; }
        .fa-map:hover { color: #27ae60 !important; } /* Farbe für CartographyAssets */
